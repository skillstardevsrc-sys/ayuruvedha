<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treatment - Ayusha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        leafGreen: '#7AC943',
                        darkGreen: '#2B4A3B',
                        creamWhite: '#FAF7F2',
                        goldenSun: '#F5B642',
                        darkBg: '#09120F'
                    },
                    fontFamily: {
                        cormorant: ['"Cormorant Garamond"', 'serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-darkBg text-creamWhite font-poppins overflow-x-hidden">

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 transition-all duration-500 py-4 md:py-6 px-4 md:px-10">
        <div
            class="max-w-7xl mx-auto flex justify-between items-center bg-white/5 backdrop-blur-md rounded-full px-4 md:px-8 py-2 md:py-3 border border-white/10 shadow-lg">
            <a href="index.html"
                class="font-cormorant text-xl md:text-2xl font-bold text-creamWhite tracking-wider flex items-center gap-2 hover:text-goldenSun transition">
                <span class="text-leafGreen">←</span> <span class="hidden sm:inline">Back Home</span>
            </a>
            <button
                class="booking-btn bg-leafGreen/90 hover:bg-leafGreen text-darkGreen px-4 md:px-6 py-2 text-sm md:text-base rounded-full font-medium transition shadow-[0_0_15px_rgba(122,201,67,0.3)]">
                Book <span class="hidden sm:inline">Session</span>
            </button>
        </div>
    </nav>

    <!-- Treatment Content -->
    <section
        class="min-h-screen relative flex items-center justify-center pt-24 md:pt-32 pb-16 md:pb-20 overflow-hidden px-4 sm:px-6 md:px-10">

        <!-- Massive Background Typography -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-[20vw] md:text-[15vw] font-cormorant font-bold text-white/[0.03] whitespace-nowrap z-0 pointer-events-none tracking-widest uppercase select-none"
            id="bg-typography">
            AYUSHA
        </div>

        <div
            class="max-w-[90rem] mx-auto w-full relative z-20 flex flex-col lg:flex-row items-center justify-between mt-6 md:mt-10">

            <!-- Left: Floating Glass Typography Card -->
            <div
                class="lg:w-5/12 content-reveal opacity-0 -translate-x-16 relative z-30 order-2 lg:order-1 lg:-mr-20 mt-[-4rem] md:mt-[-5rem] lg:mt-0 w-full">
                <div
                    class="glass-card p-6 sm:p-8 md:p-12 rounded-[2rem] md:rounded-[2.5rem] border border-white/10 bg-darkBg/70 backdrop-blur-3xl shadow-[0_30px_80px_rgba(0,0,0,0.8)] relative overflow-hidden group">

                    <!-- Decorative inner line -->
                    <div
                        class="absolute top-12 bottom-12 left-8 w-[2px] bg-gradient-to-b from-leafGreen/0 via-leafGreen/50 to-leafGreen/0 hidden sm:block">
                    </div>

                    <div class="sm:pl-8">
                        <p id="t-subtitle"
                            class="text-goldenSun tracking-[0.3em] uppercase text-xs mb-6 font-semibold flex items-center gap-3">
                            <span class="w-10 h-[1px] bg-goldenSun/50 inline-block"></span> Loading...
                        </p>

                        <h1 id="t-title"
                            class="font-cormorant text-5xl md:text-7xl lg:text-8xl font-bold mb-8 leading-none drop-shadow-2xl text-white">
                            Loading...
                        </h1>

                        <div class="w-20 h-[3px] bg-leafGreen mb-8 rounded-full shadow-[0_0_10px_rgba(122,201,67,0.5)]">
                        </div>

                        <p id="t-desc" class="text-lg font-light text-creamWhite/90 mb-10 leading-relaxed max-w-md">
                            Loading details...
                        </p>

                        <button
                            class="booking-btn relative inline-flex items-center justify-center px-10 py-5 font-bold text-darkBg transition-all duration-500 bg-goldenSun rounded-full hover:bg-leafGreen overflow-hidden group/btn shadow-[0_0_30px_rgba(245,182,66,0.4)] hover:shadow-[0_0_40px_rgba(122,201,67,0.6)] w-full sm:w-auto">
                            <span class="relative z-10 flex items-center justify-center gap-3 w-full">
                                Book Session
                                <span class="group-hover/btn:translate-x-2 transition-transform duration-300">→</span>
                            </span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Balanced Image Container -->
            <div
                class="lg:w-7/12 relative h-[40vh] sm:h-[50vh] lg:h-[75vh] w-full rounded-[2rem] lg:rounded-[3rem] overflow-hidden image-reveal opacity-0 scale-95 shadow-[0_20px_60px_rgba(0,0,0,0.8)] border border-white/10 order-1 lg:order-2 group">
                <div
                    class="absolute inset-0 bg-gradient-to-t from-darkBg/90 via-darkBg/20 to-transparent mix-blend-overlay z-10 pointer-events-none">
                </div>
                <!-- Interactive Glow -->
                <div
                    class="absolute inset-0 bg-leafGreen/20 mix-blend-color z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-1000 pointer-events-none">
                </div>

                <img id="t-img" src="" alt="Treatment"
                    class="absolute inset-0 w-full h-full object-cover object-center transition-transform duration-[4s] group-hover:scale-105">

                <!-- Floating geometric elements -->
                <div
                    class="absolute top-20 right-20 w-32 h-32 border border-goldenSun/30 rounded-full animate-[spin_10s_linear_infinite] z-20 pointer-events-none hidden lg:block">
                </div>
                <div
                    class="absolute top-16 right-16 w-40 h-40 border border-leafGreen/20 rounded-full animate-[spin_15s_linear_infinite_reverse] z-20 pointer-events-none hidden lg:block">
                </div>
            </div>
        </div>

        <!-- Decorative background elements -->
        <div
            class="absolute top-0 right-0 w-64 h-64 md:w-[40vw] md:h-[40vw] bg-leafGreen/10 blur-[100px] md:blur-[150px] rounded-full pointer-events-none -z-10">
        </div>
        <div
            class="absolute bottom-0 left-0 w-64 h-64 md:w-[40vw] md:h-[40vw] bg-goldenSun/5 blur-[100px] md:blur-[150px] rounded-full pointer-events-none -z-10">
        </div>
    </section>

    <!-- Booking Popup Modal -->
    <div id="booking-modal" class="fixed inset-0 z-[1000] hidden items-center justify-center pointer-events-none px-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md modal-backdrop opacity-0"></div>
        <div
            class="modal-content relative bg-darkBg/95 border border-white/10 rounded-2xl md:rounded-3xl w-[100%] sm:w-[90%] max-w-lg overflow-hidden shadow-[0_10px_50px_rgba(0,0,0,0.5)] p-6 md:p-12 opacity-0 translate-y-10 scale-95">
            <button
                class="modal-close absolute top-4 right-4 text-white/50 hover:text-white bg-black/20 hover:bg-black/50 rounded-full w-10 h-10 flex items-center justify-center transition z-10">✕</button>
            <h4 class="font-cormorant text-3xl mb-2 text-white">Book Your Session</h4>
            <p class="text-creamWhite/70 font-light mb-8 text-sm">Fill out the form below and our team will get in touch
                to confirm your appointment.</p>
            <form class="space-y-4">
                <input type="text" placeholder="Full Name"
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm outline-none focus:border-leafGreen text-white transition">
                <input type="text" placeholder="Phone Number"
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm outline-none focus:border-leafGreen text-white transition">
                <input type="date"
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm outline-none focus:border-leafGreen text-white transition [color-scheme:dark]">
                <button type="button"
                    class="w-full bg-leafGreen hover:bg-green-500 text-darkGreen font-semibold py-4 rounded-lg transition mt-4 shadow-[0_0_15px_rgba(122,201,67,0.2)]">Confirm
                    Appointment</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script>
        // Smooth Scrolling Setup
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Data for treatments
        const treatmentsData = {
            'panchakarma': {
                title: 'Panchakarma',
                subtitle: 'Complete Body Detox',
                desc: '<span class="text-5xl font-cormorant text-leafGreen float-left mr-3 mt-1 leading-none">E</span>xperience profound cleansing and rejuvenation. Panchakarma is an ancient Ayurvedic therapy designed to remove toxins from deep within your tissues and restore balance to your doshas.<br><br>Our expert healers guide you through a <span class="text-goldenSun font-medium">personalized journey</span> of five transformative actions, leaving your mind and body completely renewed.',
                img: 'images/panchakarma.png'
            },
            'skincare': {
                title: 'Skin Care',
                subtitle: 'Natural Glowing Radiance',
                desc: '<span class="text-5xl font-cormorant text-leafGreen float-left mr-3 mt-1 leading-none">U</span>nveil your natural beauty with our holistic Ayurvedic skin care rituals. Using pure, <span class="text-goldenSun font-medium">forest-sourced herbs</span> and therapeutic oils, our treatments nourish your skin from within.<br><br>We focus on balancing your internal health to create an external, <span class="text-white italic">timeless glow</span> that radiates pure vitality and wellness.',
                img: 'images/skincare.png'
            },
            'flow_cleanse': {
                title: 'Hydrotherapy',
                subtitle: 'Flow & Cleanse',
                desc: '<span class="text-5xl font-cormorant text-leafGreen float-left mr-3 mt-1 leading-none">W</span>ash away the stress of modern life. Our signature hydrotherapies and warm herbal oil treatments (like <span class="text-goldenSun font-medium">Shirodhara</span>) flow like a tranquil waterfall, clearing mental and physical blockages.<br><br>Immerse yourself in <span class="text-white italic">profound stillness</span> and restore your bodys natural, harmonious flow.',
                img: 'images/flow_cleanse.png'
            },
            'yoga': {
                title: 'Yoga',
                subtitle: 'Mind & Spirit',
                desc: '<span class="text-5xl font-cormorant text-leafGreen float-left mr-3 mt-1 leading-none">R</span>econnect with your inner self through our specialized Ayurvedic yoga sessions. Set in the heart of our lush green sanctuary, our master yogis guide you through ancient asanas designed to align your physical and energetic bodies.<br><br>Find your <span class="text-goldenSun font-medium">center of gravity</span> and breathe absolute peace into every cell.',
                img: 'images/yoga.png'
            },
            'meditation': {
                title: 'Meditation',
                subtitle: 'Deep Awareness',
                desc: '<span class="text-5xl font-cormorant text-leafGreen float-left mr-3 mt-1 leading-none">T</span>ranscend the noise of daily life. Our guided meditation sessions take place by the serene lotus pond at sunrise, utilizing primordial sound and breathwork to quiet the mind.<br><br>Step into <span class="text-white italic">pure awareness</span> and discover the boundless sanctuary that exists within your own consciousness.',
                img: 'images/meditation.png'
            },
            'stress_relief': {
                title: 'Stress Relief',
                subtitle: 'Total Relaxation',
                desc: '<span class="text-5xl font-cormorant text-leafGreen float-left mr-3 mt-1 leading-none">M</span>elt away the tension held deep within your muscles and nervous system. Our exclusive stress-relief therapies utilize warm, adaptogenic oils that nourish the body on a cellular level.<br><br>Experience a <span class="text-goldenSun font-medium">luxurious escape</span> where profound relaxation triggers your bodys innate healing intelligence.',
                img: 'images/stress_relief.png'
            }
        };

        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');

        const data = treatmentsData[type] || treatmentsData['panchakarma']; // Default to panchakarma if invalid

        // Populate content
        document.getElementById('bg-typography').innerText = data.title.toUpperCase();
        document.getElementById('t-title').innerText = data.title;
        document.getElementById('t-subtitle').innerHTML = `<span class="w-10 h-[1px] bg-goldenSun/50 inline-block"></span> ${data.subtitle}`;
        document.getElementById('t-desc').innerHTML = data.desc;
        document.getElementById('t-img').src = data.img;

        // Intro GSAP Animations
        document.addEventListener("DOMContentLoaded", () => {
            const tl = gsap.timeline();

            tl.to(".image-reveal", {
                scale: 1,
                opacity: 1,
                duration: 1.5,
                ease: "power3.out",
                delay: 0.1
            })
                .to(".content-reveal", {
                    x: 0,
                    opacity: 1,
                    duration: 1.2,
                    ease: "power3.out"
                }, "-=0.8")
                .from("#t-img", {
                    scale: 1.2,
                    duration: 2,
                    ease: "power2.out"
                }, "-=1.5");
        });

        // Booking Modal Logic
        const bookingModal = document.getElementById('booking-modal');
        const modalBackdrop = bookingModal.querySelector('.modal-backdrop');
        const modalContent = bookingModal.querySelector('.modal-content');
        const modalCloseBtn = bookingModal.querySelector('.modal-close');

        document.querySelectorAll('.booking-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                bookingModal.classList.remove('hidden', 'pointer-events-none');
                bookingModal.classList.add('flex', 'pointer-events-auto');
                lenis.stop();

                gsap.to(modalBackdrop, { opacity: 1, duration: 0.3 });
                gsap.to(modalContent, { y: 0, scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.5)" });
            });
        });

        const closeBookingModal = () => {
            gsap.to(modalBackdrop, { opacity: 0, duration: 0.3 });
            gsap.to(modalContent, {
                y: 50, scale: 0.95, opacity: 0, duration: 0.3, ease: "power2.in",
                onComplete: () => {
                    bookingModal.classList.add('hidden', 'pointer-events-none');
                    bookingModal.classList.remove('flex', 'pointer-events-auto');
                    lenis.start();

                    const submitBtn = bookingModal.querySelector('button[type="button"]');
                    if (submitBtn) {
                        submitBtn.innerText = "Confirm Appointment";
                        submitBtn.classList.remove('bg-green-600', 'text-white');
                    }
                }
            });
        };

        modalCloseBtn.addEventListener('click', closeBookingModal);
        modalBackdrop.addEventListener('click', closeBookingModal);

        // Form validation
        bookingModal.querySelector('form button[type="button"]').addEventListener('click', function () {
            const form = this.closest('form');
            const inputs = form.querySelectorAll('input');
            let allFilled = true;
            inputs.forEach(input => { if (input.value.trim() === '') allFilled = false; });

            if (allFilled) {
                this.innerText = "✓ Request Sent Successfully!";
                this.classList.add('bg-green-600', 'text-white');
                inputs.forEach(input => input.value = '');
            } else {
                this.innerText = "Please fill all fields";
                setTimeout(() => {
                    this.innerText = "Confirm Appointment";
                }, 2000);
            }
        });

        // --- Custom Cursor Logic ---
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');

        if (cursorDot && cursorOutline) {
            gsap.set(cursorOutline, { xPercent: -50, yPercent: -50 });
            gsap.set(cursorDot, { xPercent: -50, yPercent: -50 });

            window.addEventListener('mousemove', (e) => {
                const posX = e.clientX;
                const posY = e.clientY;

                gsap.set(cursorDot, { x: posX, y: posY });
                gsap.to(cursorOutline, {
                    x: posX,
                    y: posY,
                    duration: 0.15,
                    ease: "power2.out"
                });
            });

            const hoverElements = document.querySelectorAll('a, button, .cursor-pointer, .booking-btn');
            hoverElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorOutline.classList.add('hover');
                });
                el.addEventListener('mouseleave', () => {
                    cursorOutline.classList.remove('hover');
                });
            });
        }
    </script>
</body>

</html>
